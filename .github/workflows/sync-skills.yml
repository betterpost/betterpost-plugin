name: Sync skills from betterpost.ai

on:
  schedule:
    - cron: '0 6 * * *' # Run daily at 06:00 UTC
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Run sync script
        run: node scripts/sync.js

      - name: Commit and push changes
        shell: bash
        run: |
          git add skills AGENTS.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Only commit and push if the sync produced changes.
          git diff --staged --quiet || (git commit -m "sync skills from betterpost.ai" && git push)
