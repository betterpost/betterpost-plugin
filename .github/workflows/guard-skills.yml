name: Guard synced skills

on:
  pull_request:
    paths:
      - 'skills/betterpost/SKILL.md'
      - 'AGENTS.md'

jobs:
  block:
    runs-on: ubuntu-latest
    steps:
      - name: Explain that these files are auto-synced
        run: |
          echo "::error::skills/betterpost/SKILL.md and AGENTS.md are automatically"
          echo "::error::synced from https://betterpost.ai/.well-known/skills. Hand-edits"
          echo "::error::here will be overwritten by the next sync."
          echo ""
          echo "These files are generated by scripts/sync.js from the canonical copies"
          echo "served at https://betterpost.ai/.well-known/skills. To make a lasting"
          echo "change, edit the source at betterpost.ai instead — the daily sync-skills"
          echo "workflow will pull it into this repo automatically."
          echo ""
          echo "(The using-betterpost bootstrap skill is hand-maintained and is not"
          echo "guarded here.)"
          exit 1
